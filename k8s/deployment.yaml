# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: facilitacaixa-api
  namespace: production
  labels:
    app: facilitacaixa-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: facilitacaixa-api
  template:
    metadata:
      labels:
        app: facilitacaixa-api
    spec:
      containers:
      - name: app
        image: rodcferraz/facilitacaixa-api:latest
        imagePullPolicy: Always
        env:
        - name: TESTE
          valueFrom:
            secretKeyRef:
              name: facilitacaixa.api-secret
              key: TESTE
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5