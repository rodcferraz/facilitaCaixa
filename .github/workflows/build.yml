  build-and-push:
    name: Publish image
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}
        tags: |
          type=raw,value=latest

    - name: Build and push with latest tag
      uses: docker/build-push-action@v5
      with:
        context: ./FacilitaCaixa.Api
        push: true
        tags: ${{ steps.meta.outputs.tags }}

    - name: Update deployment
      run: |
        IMAGE_TAG="${{ steps.meta.outputs.tags }}"
        sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" k8s/deployment.yaml

    - name: Upload manifestos k8s
      uses: actions/upload-artifact@v4
      with:
        name: k8s-manifests
        path: k8s/

  deploy:
    name: Deploy de aplicação
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download k8s manifests
      uses: actions/download-artifact@v4
      with:
        name: k8s-manifests
        path: k8s/

    - name: Instalar kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Configurar kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Criar namespace caso inexistente
      run: |
        kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Aplicar Secret
      run: |
        kubectl apply -f k8s/secret.yaml -n ${{ env.K8S_NAMESPACE }}

    - name: Aplicar Deployment
      run: |
        kubectl apply -f k8s/deployment.yaml -n ${{ env.K8S_NAMESPACE }}

    - name: Aplicar Service
      run: |
        kubectl apply -f k8s/service.yaml -n ${{ env.K8S_NAMESPACE }}

    - name: Verify deployment
      run: |
        kubectl get pods -n ${{ env.K8S_NAMESPACE }}
        kubectl get services -n ${{ env.K8S_NAMESPACE }}
